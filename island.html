<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="additional/favicon.ico">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>the end</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: monospace; }
  canvas {
    display: block;
    width: 100vw !important;
    height: 100vh !important;
  }
  #ui {
    position: fixed; bottom: 18px; left: 50%;
    transform: translateX(-50%);
    color: #fff; font-size: 12px; opacity: 0.6;
    text-shadow: 1px 1px 0 #000;
    pointer-events: none;
    white-space: nowrap;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>
<div id="ui">WASD / ARROWS — MOVE &nbsp;|&nbsp; MOUSE — LOOK</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── AUDIO ───────────────────────────────────────────────────────────────────
const bgAudio = document.createElement('audio');
bgAudio.src = 'audio/abc.mp3';
bgAudio.loop = true;
bgAudio.volume = 0.6;
// Autoplay requires user gesture — start on first click
document.addEventListener('click', () => bgAudio.play().catch(() => {}), { once: true });

// ─── SCENE SETUP ─────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87AEBF);
scene.fog = new THREE.Fog(0x87AEBF, 40, 140);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 1.7, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = false;
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── LIGHTING ────────────────────────────────────────────────────────────────
const sun = new THREE.DirectionalLight(0xFFEECC, 1.2);
sun.position.set(30, 60, 20);
scene.add(sun);
scene.add(new THREE.AmbientLight(0x6699BB, 0.7));

// ─── TEXTURE HELPER (nearest neighbour = PS1 look) ───────────────────────────
const txLoader = new THREE.TextureLoader();
function loadTex(url) {
  const t = txLoader.load(url);
  t.minFilter = THREE.NearestFilter;
  t.magFilter = THREE.NearestFilter;
  return t;
}

// ─── PALETTE ─────────────────────────────────────────────────────────────────
const C = {
  sand:      0xE8C87A,
  sandDark:  0xC9A85A,
  grass:     0x4A9B3F,
  grassDark: 0x357A2B,
  trunk:     0x7A5230,
  leaf:      0x2A7A1A,
  water:     0x1A5F8A,
  waterFoam: 0x4A9FBF,
  obelisk:   0x111111,
};

// ─── OCEAN ───────────────────────────────────────────────────────────────────
const oceanGeo = new THREE.PlaneGeometry(500, 500, 1, 1);
const ocean = new THREE.Mesh(oceanGeo, new THREE.MeshLambertMaterial({ color: C.water }));
ocean.rotation.x = -Math.PI / 2;
ocean.position.y = -0.3;
scene.add(ocean);

// ─── MAIN ISLAND ─────────────────────────────────────────────────────────────
function makeLowPolyIsland(rx, rz, y, segs, color, darkColor) {
  const geo = new THREE.CylinderGeometry(0, 1, 0.1, segs, 1);
  // Just use a disc + mound
  const group = new THREE.Group();

  // Base disc
  const baseGeo = new THREE.CylinderGeometry(rx * 0.98, rx, 0.55, segs);
  jitterVerts(baseGeo, 0.6);
  const baseMesh = new THREE.Mesh(baseGeo, new THREE.MeshLambertMaterial({ color: darkColor, flatShading: true }));
  baseMesh.position.y = y - 0.28;
  group.add(baseMesh);

  // Top surface
  const topGeo = new THREE.CylinderGeometry(rx * 0.95, rx * 0.98, 0.18, segs);
  jitterVerts(topGeo, 0.35);
  const topMesh = new THREE.Mesh(topGeo, new THREE.MeshLambertMaterial({ color, flatShading: true }));
  topMesh.position.y = y;
  group.add(topMesh);

  return group;
}

function jitterVerts(geo, amt) {
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    pos.setX(i, pos.getX(i) + (Math.random() - 0.5) * amt);
    pos.setZ(i, pos.getZ(i) + (Math.random() - 0.5) * amt);
  }
  pos.needsUpdate = true;
  geo.computeVertexNormals();
}

const mainIsland = makeLowPolyIsland(16, 16, 0, 12, C.grass, C.sandDark);
scene.add(mainIsland);

// Sandy beach ring
const beachGeo = new THREE.CylinderGeometry(17.5, 18, 0.12, 14);
jitterVerts(beachGeo, 0.8);
const beach = new THREE.Mesh(beachGeo, new THREE.MeshLambertMaterial({ color: C.sand, flatShading: true }));
beach.position.y = -0.15;
scene.add(beach);

// ─── DISTANT SMALL ISLAND ────────────────────────────────────────────────────
const distIsland = makeLowPolyIsland(8, 8, 0, 10, C.sand, C.sandDark);
distIsland.position.set(70, 0, -30);
scene.add(distIsland);

// A few tiny rocks around distant island
for (let i = 0; i < 3; i++) {
  const rg = new THREE.DodecahedronGeometry(0.6 + Math.random() * 0.5, 0);
  const rm = new THREE.Mesh(rg, new THREE.MeshLambertMaterial({ color: 0x888877, flatShading: true }));
  const a = Math.random() * Math.PI * 2;
  rm.position.set(70 + Math.cos(a) * 9, -0.1, -30 + Math.sin(a) * 9);
  scene.add(rm);
}

// ─── PALM TREE ───────────────────────────────────────────────────────────────
function makePalm(x, z, height, lean) {
  const group = new THREE.Group();

  // Trunk — stacked tapered cylinders
  const segments = 5;
  for (let i = 0; i < segments; i++) {
    const t = i / segments;
    const segH = height / segments;
    const r0 = 0.22 * (1 - t * 0.4);
    const r1 = 0.22 * (1 - (t + 1 / segments) * 0.4);
    const geo = new THREE.CylinderGeometry(r1, r0, segH, 5);
    const mesh = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color: C.trunk, flatShading: true }));
    mesh.position.y = i * segH + segH / 2;
    mesh.rotation.z = lean * (i / segments) * 0.15;
    mesh.position.x = lean * Math.pow(i / segments, 2) * height * 0.1;
    group.add(mesh);
  }

  // Fronds
  const frondCount = 7;
  for (let i = 0; i < frondCount; i++) {
    const angle = (i / frondCount) * Math.PI * 2;
    const frondGeo = new THREE.ConeGeometry(0.25, 2.8, 4);
    jitterVerts(frondGeo, 0.12);
    const frond = new THREE.Mesh(frondGeo, new THREE.MeshLambertMaterial({ color: C.leaf, flatShading: true }));
    frond.position.set(
      Math.cos(angle) * 1.1,
      height - 0.2,
      Math.sin(angle) * 1.1
    );
    frond.rotation.z = Math.cos(angle) * 0.9;
    frond.rotation.x = Math.sin(angle) * 0.9;
    group.add(frond);

    // Coconuts
    if (Math.random() > 0.5) {
      const cg = new THREE.SphereGeometry(0.12, 4, 4);
      const cc = new THREE.Mesh(cg, new THREE.MeshLambertMaterial({ color: 0x3A2810, flatShading: true }));
      cc.position.set(Math.cos(angle) * 0.5, height - 0.4, Math.sin(angle) * 0.5);
      group.add(cc);
    }
  }

  // Crown tuft
  const crownGeo = new THREE.SphereGeometry(0.6, 5, 4);
  jitterVerts(crownGeo, 0.18);
  const crown = new THREE.Mesh(crownGeo, new THREE.MeshLambertMaterial({ color: C.leaf, flatShading: true }));
  crown.position.y = height + 0.1;
  group.add(crown);

  group.position.set(x, 0, z);
  return group;
}

// Place palms on main island
const palmPositions = [
  [-5, -7, 4.5, 0.4], [7, -3, 5, -0.3], [3, 8, 4.8, 0.2],
  [-9, 2, 5.5, 0.5], [1, -11, 4.2, -0.4], [11, 5, 5, 0.3],
  [-3, 5, 4.6, -0.2], [6, 10, 4.4, 0.35],
];
palmPositions.forEach(([x, z, h, lean]) => {
  scene.add(makePalm(x, z, h, lean));
});

// Palms on distant island
const distPalmPos = [[-1, 1], [2, -2], [-2, -1]];
distPalmPos.forEach(([dx, dz]) => {
  const p = makePalm(70 + dx * 3, -30 + dz * 3, 4 + Math.random(), (Math.random() - 0.5) * 0.6);
  scene.add(p);
});

// ─── ROCKS / DETAIL ──────────────────────────────────────────────────────────
for (let i = 0; i < 10; i++) {
  const a = Math.random() * Math.PI * 2;
  const r = 5 + Math.random() * 9;
  const geo = new THREE.DodecahedronGeometry(0.2 + Math.random() * 0.5, 0);
  const mesh = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color: 0x8A7A60, flatShading: true }));
  mesh.position.set(Math.cos(a) * r, 0.1, Math.sin(a) * r);
  scene.add(mesh);
}

// ─── OBELISKS ────────────────────────────────────────────────────────────────
function makeObelisk(x, z, imagePath) {
  const group = new THREE.Group();

  const W = 2.4, H = 4.5, D = 0.25;
  // Main body
  const bodyGeo = new THREE.BoxGeometry(W, H * 0.85, D);
  const bodyMat = new THREE.MeshLambertMaterial({ color: C.obelisk });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = H * 0.85 / 2;
  group.add(body);

  // Pyramidion top
  const tipGeo = new THREE.ConeGeometry(W * 0.55, H * 0.15, 4);
  tipGeo.rotateY(Math.PI / 4);
  const tip = new THREE.Mesh(tipGeo, new THREE.MeshLambertMaterial({ color: 0x1A1A1A, flatShading: true }));
  tip.position.y = H * 0.85 + H * 0.075;
  group.add(tip);

  // Base plinth
  const plinthGeo = new THREE.BoxGeometry(W * 1.3, 0.3, D * 1.3);
  const plinth = new THREE.Mesh(plinthGeo, bodyMat);
  plinth.position.y = 0.15;
  group.add(plinth);

  // Image plane on front face
  const imgTex = loadTex(imagePath);
  imgTex.wrapS = imgTex.wrapT = THREE.ClampToEdgeWrapping;
  const imgAspect = 417 / 626; // portrait
  const imgH = H * 0.75;
  const imgW = imgH * imgAspect;
  const imgGeo = new THREE.PlaneGeometry(imgW, imgH);
  const imgMat = new THREE.MeshBasicMaterial({ map: imgTex, transparent: true });
  const imgMesh = new THREE.Mesh(imgGeo, imgMat);
  imgMesh.position.set(0, H * 0.45, D / 2 + 0.01);
  group.add(imgMesh);

  group.position.set(x, 0, z);
  return group;
}

// Three obelisks arranged in a triangle on main island
const obeliskData = [
  [0, -5],
  [-4, 3],
  [4, 3],
];
obeliskData.forEach(([x, z], i) => {
  const o = makeObelisk(x, z, `images/credits${i + 1}.png`);
  // Face inward (toward center), flipped 180° from before
  o.lookAt(new THREE.Vector3(0, 0, 0));
  scene.add(o);
});

// ─── DISTANT BILLBOARD FIGURES ───────────────────────────────────────────────
function makeBillboard(x, z, imagePath, height) {
  const aspect = 417 / 626;
  const h = height || 4.5;
  const w = h * aspect;
  const geo = new THREE.PlaneGeometry(w, h);
  const tex = loadTex(imagePath);
  tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
  const mat = new THREE.MeshBasicMaterial({
    map: tex, transparent: true, side: THREE.DoubleSide,
    alphaTest: 0.1,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, h / 2 + 0.1, z);
  // Billboard always faces camera — handled in render loop
  mesh.userData.isBillboard = true;
  return mesh;
}

const billboardImages = [
  'images/team1.png',
  'images/team2.png',
  'images/team3.png',
  'images/team4.png',
];

const billboards = [];
const billboardAngles = [0, Math.PI * 0.5, Math.PI, Math.PI * 1.5];
billboardAngles.forEach((angle, i) => {
  const r = 5.5;
  const bx = 70 + Math.cos(angle) * r;
  const bz = -30 + Math.sin(angle) * r;
  const bb = makeBillboard(bx, bz, billboardImages[i], 4.5);
  billboards.push(bb);
  scene.add(bb);
});

// ─── INVISIBLE BORDER ────────────────────────────────────────────────────────
const BORDER_R = 17;
// Collider is a simple radius check in movement code

// ─── PLAYER CONTROLLER ───────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup',   e => keys[e.code] = false);

// Mouse look
let yaw = 0, pitch = 0;
let pointerLocked = false;
renderer.domElement.addEventListener('click', () => renderer.domElement.requestPointerLock());
document.addEventListener('pointerlockchange', () => {
  pointerLocked = document.pointerLockElement === renderer.domElement;
});
document.addEventListener('mousemove', e => {
  if (!pointerLocked) return;
  yaw   -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch  = Math.max(-0.7, Math.min(0.7, pitch));
});

// ─── WATER ANIMATION ─────────────────────────────────────────────────────────
const waterTiles = [];
for (let i = 0; i < 6; i++) {
  const wg = new THREE.PlaneGeometry(18, 18, 1);
  const wm = new THREE.Mesh(wg, new THREE.MeshLambertMaterial({
    color: C.waterFoam, transparent: true, opacity: 0.35, flatShading: true
  }));
  wm.rotation.x = -Math.PI / 2;
  const a = (i / 6) * Math.PI * 2;
  wm.position.set(Math.cos(a) * 20, -0.25 + Math.random() * 0.05, Math.sin(a) * 20);
  wm.userData.offset = Math.random() * Math.PI * 2;
  waterTiles.push(wm);
  scene.add(wm);
}

// ─── ANIMATE ─────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
const _dir  = new THREE.Vector3();
const SPEED = 5;

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t  = clock.elapsedTime;

  // Movement
  _dir.set(0, 0, 0);
  if (keys['KeyW'] || keys['ArrowUp'])    _dir.z -= 1;
  if (keys['KeyS'] || keys['ArrowDown'])  _dir.z += 1;
  if (keys['KeyA'] || keys['ArrowLeft'])  _dir.x -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) _dir.x += 1;

  if (_dir.length() > 0) {
    _dir.normalize().applyEuler(new THREE.Euler(0, yaw, 0));
    const nx = camera.position.x + _dir.x * SPEED * dt;
    const nz = camera.position.z + _dir.z * SPEED * dt;
    const dist = Math.sqrt(nx * nx + nz * nz);
    if (dist < BORDER_R) {
      camera.position.x = nx;
      camera.position.z = nz;
    }
  }

  // Keep player on terrain (simple flat)
  camera.position.y = 1.7;

  // Camera rotation
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  // Billboards face camera
  billboards.forEach(bb => {
    bb.lookAt(camera.position);
  });

  // Water shimmer
  waterTiles.forEach(wt => {
    wt.position.y = -0.25 + Math.sin(t * 0.8 + wt.userData.offset) * 0.04;
  });

  // Render directly at PS1 res (canvas CSS-upscales)
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
