<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="additional/favicon.ico">
<meta charset="UTF-8">
<title>INTERACTION V0.1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; overflow: hidden; }
  canvas { display: block; }

  #overlay {
    position: fixed; inset: 0; background: #fff; opacity: 1;
    pointer-events: none; transition: opacity 2s ease; z-index: 200;
  }
  #overlay.fadein  { opacity: 0; }
  #overlay.fadeout { opacity: 1; }

  #hud {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: #999; font-family: 'Courier New', monospace; font-size: 10px;
    text-align: center; pointer-events: none; letter-spacing: 2px;
    opacity: 0.4; line-height: 2;
  }
  #prompt {
    position: fixed; top: 46%; left: 50%; transform: translate(-50%,-50%);
    color: #555; font-family: 'Courier New', monospace; font-size: 12px;
    letter-spacing: 5px; opacity: 0; pointer-events: none; z-index: 60;
    transition: opacity 0.3s; text-align: center;
  }
  #talked-counter {
    position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
    color: #bbb; font-family: 'Courier New', monospace; font-size: 10px;
    letter-spacing: 6px; pointer-events: none; z-index: 60; opacity: 0.7;
  }

  /* ── DIALOGUE BOX ── */
  #dialogue {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.96);
    border-top: 1px solid #ddd;
    padding: 28px 40px 24px;
    z-index: 150;
    display: none;
    font-family: 'Courier New', monospace;
    pointer-events: all;
  }
  #dialogue.active { display: block; }
  #dlg-name {
    font-size: 11px; letter-spacing: 5px; color: #aaa;
    text-transform: uppercase; margin-bottom: 10px;
  }
  #dlg-text {
    font-size: 14px; color: #333; line-height: 1.8;
    letter-spacing: 1px; min-height: 52px;
  }
  #dlg-choices {
    margin-top: 18px; display: none; gap: 12px;
    flex-direction: column;
  }
  #dlg-choices.visible { display: flex; }
  .dlg-choice {
    background: none; border: 1px solid #ccc;
    padding: 9px 18px; font-family: 'Courier New', monospace;
    font-size: 12px; letter-spacing: 2px; color: #555;
    cursor: pointer; transition: all 0.2s; text-align: left;
  }
  .dlg-choice:hover { border-color: #888; color: #222; background: #f8f8f8; }
  #dlg-continue {
    position: absolute; right: 40px; bottom: 28px;
    font-family: 'Courier New', monospace; font-size: 10px;
    color: #bbb; letter-spacing: 3px; animation: blink 1.1s infinite;
    display: none;
  }
  #dlg-continue.visible { display: block; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* cutscene vignette */
  #vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 180;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(255,255,255,0.55) 100%);
    opacity: 0; transition: opacity 1s;
  }
  #vignette.on { opacity: 1; }
</style>
</head>
<body>
<audio id="bgm" src="audio/234of.mp3" loop></audio>
<div id="overlay"></div>
<div id="vignette"></div>
<div id="talked-counter">○  ○  ○  ○</div>
<div id="prompt"></div>
<div id="hud">WASD — MOVE &nbsp;|&nbsp; MOUSE — LOOK &nbsp;|&nbsp; E — TALK</div>

<div id="dialogue">
  <div id="dlg-name">—</div>
  <div id="dlg-text"></div>
  <div id="dlg-choices"></div>
  <div id="dlg-continue">[ E to continue ]</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════
//  NPC DATA  — edit names, dialogue, colours here
// ═══════════════════════════════════════════════
const NPCS = [
  {
    id: 0,
    name: 'Jack',
    image: 'images/team1.png',
    position: { x: -18, z: -10 },
    toneFreq: 520,       // dialogue beep pitch (Hz)
    toneType: 'sine',
    dialogue: [
      // Each entry: { text, choices?, next }
      // 'next' can be an index or null (end)
      // 'choices' is [{label, next}]
      {
        text: "I just bought a ton of $1 t-shirts and cat food off of TikTok Shop.",
        choices: [
          { label: "What is this place?", next: 1 },
          { label: "You look fat.", next: 2 }
        ]
      },
      {
        text: "This is a demonstration of an interaction engine. It lets you interact with other people.",
        next: 3
      },
      {
        text: "परमेश्वर तेरे लोगों पर मृत्यु लाए",
        next: 3
      },
      {
        text: "Walk around the environment and talk to the other Zany Quirky Characters™.",
        next: null
      }
    ]
  },
  {
    id: 1,
    name: 'Jug',
    image: 'images/team2.png',
    position: { x: 18, z: -10 },
    toneFreq: 310,
    toneType: 'triangle',
    dialogue: [
      {
        text: "Eww.",
        choices: [
          { label: "What?", next: 1 },
          { label: "What's wrong with you?", next: 2 }
        ]
      },
      {
        text: "You need to get a job. You smell like you haven't showered in two weeks and you look fat in those clothes.",
        next: 3
      },
      {
        text: "A lot.",
        next: 3
      },
      {
        text: "🙄",
        next: null
      }
    ]
  },
  {
    id: 2,
    name: 'Lewis',
    image: 'images/team3.png',
    position: { x: -18, z: 14 },
    toneFreq: 690,
    toneType: 'square',
    dialogue: [
      {
        text: "What's on your mind?",
        choices: [
          { label: "I've been thinking a lot about death and reincarnation. The heat death of the universe also scares me and I don't know what I'm going to make of my life.", next: 1 },
          { label: "Burger", next: 2 }
        ]
      },
      {
        text: "Your life is what you make of it. Everything will fall into place with time. You must take care of yourself to succeed.",
        next: 3
      },
      {
        text: "You sick fuck.",
        next: 3
      },
      {
        text: "What do you think about that Raymond guy?",
        next: null
      }
    ]
  },
  {
    id: 3,
    name: 'Raymond',
    image: 'images/team4.png',
    position: { x: 18, z: 14 },
    toneFreq: 420,
    toneType: 'sawtooth',
    dialogue: [
      {
        text: "Did you know that all the pizzas at Domino's© are all different?",
        choices: [
          { label: "Okay, fag.", next: 1 },
          { label: "That's just not true.", next: 2 }
        ]
      },
      {
        text: "Wow. Just wow, are you serious? How dare you. Do you know who I am? Do you know the evil I am capable of? How dare you insult someone like me. I am in a very happy gay relationship. Sometimes I think about the little gay people in my phone. Oh Moon OBS how I dream of you. Why why why. I have one too many stamps in my bedroom. Truly a problem, but I suppose not if I'm using them all. Not an issue. If you look at the sky you can see little black dots. That hurts my eyes. What time is it? If Freddy Fazbear was real, would you cancel him on Twitter? I think about the sky sometimes. I wish the sun wasn't going to explode so I could live forever. As if immortality isn't enough. But it will explode. My bad. Happy birthday! Congratulations!",
        next: 3
      },
      {
        text: "But it is. It totally is. It's absolutely true. If you think anything else you're misinformed. And fake. And gay.",
        next: 3
      },
      {
        text: "I'm getting lightheaded.",
        next: null  // triggers cutscene if all talked
      }
    ]
  }
];

// ═══════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let dialogueTicker = null;
let currentNpcTone = { freq: 440, type: 'sine' };

function playDialogueTick() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = currentNpcTone.type;
  osc.frequency.setValueAtTime(currentNpcTone.freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.07, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + 0.06);
}

function startTalking(npc) {
  currentNpcTone = { freq: npc.toneFreq, type: npc.toneType };
}
function stopTalking() {
  if (dialogueTicker) { clearInterval(dialogueTicker); dialogueTicker = null; }
}

// ═══════════════════════════════════════════════
//  THREE.JS SETUP
// ═══════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);
scene.fog = new THREE.Fog(0xffffff, 30, 90);

const camera = new THREE.PerspectiveCamera(72, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0, 2.2, 0);

// Lighting
const ambLight = new THREE.AmbientLight(0xffffff, 0.7);
scene.add(ambLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
dirLight.position.set(20, 40, 10);
dirLight.castShadow = true;
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0xd8e8ff, 0.3);
fillLight.position.set(-10, 5, -20);
scene.add(fillLight);

// ── FLOOR
const floorGeo = new THREE.PlaneGeometry(120, 120, 24, 24);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0xf5f5f5, roughness: 0.9, metalness: 0.0,
  wireframe: false
});
// Subtle PS1-style vertex displacement
const fPos = floorGeo.attributes.position;
for (let i = 0; i < fPos.count; i++) {
  fPos.setY(i, (Math.random() - 0.5) * 0.08);
}
fPos.needsUpdate = true;
floorGeo.computeVertexNormals();
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

// ── BORDER GEOMETRY (pillars + low walls)
const BORDER = 32;
function makeBorderPillar(x, z, h=12, r=0.8) {
  const geo = new THREE.CylinderGeometry(r, r*1.1, h, 6);
  const mat = new THREE.MeshStandardMaterial({ color: 0xe8e8e8, roughness: 1 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, h/2, z);
  mesh.castShadow = true;
  scene.add(mesh);
}
function makeWallSegment(x, z, rx, rz, w, h=3) {
  const geo = new THREE.BoxGeometry(w, h, 0.6);
  const mat = new THREE.MeshStandardMaterial({ color: 0xeaeaea, roughness: 1 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, h/2, z);
  mesh.rotation.y = Math.atan2(rz, rx);
  scene.add(mesh);
}

// Corner pillars
[-1,1].forEach(sx => [-1,1].forEach(sz => {
  makeBorderPillar(sx*BORDER, sz*BORDER, 14);
}));
// Mid pillars
[-1,0,1].forEach(s => {
  makeBorderPillar(s*BORDER, -BORDER, 9);
  makeBorderPillar(s*BORDER,  BORDER, 9);
  makeBorderPillar(-BORDER, s*BORDER, 9);
  makeBorderPillar( BORDER, s*BORDER, 9);
});
// Low walls between pillars
for (let i = -1; i <= 0; i++) {
  makeWallSegment(i*BORDER + BORDER/2, -BORDER, 1, 0, BORDER);
  makeWallSegment(i*BORDER + BORDER/2,  BORDER, 1, 0, BORDER);
  makeWallSegment(-BORDER, i*BORDER + BORDER/2, 0, 1, BORDER);
  makeWallSegment( BORDER, i*BORDER + BORDER/2, 0, 1, BORDER);
}

// ── SCATTERED DECORATIVE GEOMETRY (PS1 style)
function randRange(a, b) { return a + Math.random() * (b - a); }
const decoMats = [
  new THREE.MeshStandardMaterial({ color: 0xf0f0f0, roughness: 0.95, wireframe: false }),
  new THREE.MeshStandardMaterial({ color: 0xe8e8e8, roughness: 1.0, wireframe: false }),
];
for (let i = 0; i < 18; i++) {
  const geos = [
    new THREE.TetrahedronGeometry(randRange(0.6,1.4)),
    new THREE.OctahedronGeometry(randRange(0.5,1.2)),
    new THREE.BoxGeometry(randRange(0.5,1.2), randRange(1,3), randRange(0.5,1.2)),
  ];
  const geo = geos[Math.floor(Math.random()*geos.length)];
  const mat = decoMats[Math.floor(Math.random()*decoMats.length)];
  const mesh = new THREE.Mesh(geo, mat);
  let px, pz;
  do { px = randRange(-28, 28); pz = randRange(-28, 28); }
  while (Math.abs(px) < 8 && Math.abs(pz) < 8); // keep center clear
  mesh.position.set(px, randRange(0.4, 1.2), pz);
  mesh.rotation.set(randRange(0,Math.PI), randRange(0,Math.PI), randRange(0,Math.PI));
  mesh.castShadow = true;
  scene.add(mesh);
}

// ── NPC SPRITES (textured billboards)
const loader = new THREE.TextureLoader();
const npcMeshes = [];

NPCS.forEach((npc, i) => {
  const tex = loader.load(npc.image);
  tex.magFilter = THREE.NearestFilter;  // PS1 pixelated look
  tex.minFilter = THREE.NearestFilter;

  const mat = new THREE.MeshBasicMaterial({
    map: tex,
    side: THREE.DoubleSide,
    transparent: true,
    alphaTest: 0.1
  });
  const geo = new THREE.PlaneGeometry(3.2, 4.2);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(npc.position.x, 2.1, npc.position.z);
  mesh.castShadow = false;
  mesh.userData = { npcIndex: i };
  scene.add(mesh);
  npcMeshes.push(mesh);

  // Small pedestal
  const pedGeo = new THREE.CylinderGeometry(0.8, 1.0, 0.4, 8);
  const pedMat = new THREE.MeshStandardMaterial({ color: 0xebebeb, roughness: 1 });
  const ped = new THREE.Mesh(pedGeo, pedMat);
  ped.position.set(npc.position.x, 0.2, npc.position.z);
  scene.add(ped);
});

// ═══════════════════════════════════════════════
//  PLAYER CONTROLS
// ═══════════════════════════════════════════════
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyE') handleE();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

let yaw = 0, pitch = 0;
let pointerLocked = false;
document.addEventListener('click', () => {
  if (!dialogueActive) renderer.domElement.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
  pointerLocked = document.pointerLockElement === renderer.domElement;
});
document.addEventListener('mousemove', e => {
  if (!pointerLocked || dialogueActive || cutsceneActive) return;
  yaw   -= e.movementX * 0.0018;
  pitch -= e.movementY * 0.0018;
  pitch  = Math.max(-0.9, Math.min(0.9, pitch));
});

// ═══════════════════════════════════════════════
//  DIALOGUE SYSTEM
// ═══════════════════════════════════════════════
let dialogueActive = false;
let currentNpcIdx = -1;
let currentNodeIdx = 0;
let talked = new Array(NPCS.length).fill(false);
let eConsumed = false;

const dlgBox    = document.getElementById('dialogue');
const dlgName   = document.getElementById('dlg-name');
const dlgText   = document.getElementById('dlg-text');
const dlgChoices= document.getElementById('dlg-choices');
const dlgCont   = document.getElementById('dlg-continue');

let typeInterval = null;
let typingDone = false;
let fullText = '';

function typeText(text, onDone) {
  dlgText.textContent = '';
  typingDone = false;
  fullText = text;
  let i = 0;
  if (typeInterval) clearInterval(typeInterval);
  typeInterval = setInterval(() => {
    dlgText.textContent += text[i];
    i++;
    // play beep every 2 chars
    if (i % 2 === 0) playDialogueTick();
    if (i >= text.length) {
      clearInterval(typeInterval);
      typeInterval = null;
      typingDone = true;
      if (onDone) onDone();
    }
  }, 38);
}

function showNode(npcIdx, nodeIdx) {
  const npc  = NPCS[npcIdx];
  const node = npc.dialogue[nodeIdx];
  currentNpcIdx  = npcIdx;
  currentNodeIdx = nodeIdx;

  dlgName.textContent = npc.name;
  dlgChoices.innerHTML = '';
  dlgChoices.classList.remove('visible');
  dlgCont.classList.remove('visible');

  startTalking(npc);

  typeText(node.text, () => {
    if (node.choices) {
      dlgChoices.classList.add('visible');
      node.choices.forEach(ch => {
        const btn = document.createElement('button');
        btn.className = 'dlg-choice';
        btn.textContent = ch.label;
        btn.addEventListener('click', () => {
          audioCtx.resume();
          dlgChoices.classList.remove('visible');
          if (ch.next !== null && ch.next !== undefined) {
            showNode(npcIdx, ch.next);
          } else {
            endDialogue(npcIdx);
          }
        });
        dlgChoices.appendChild(btn);
      });
    } else {
      if (node.next !== null && node.next !== undefined) {
        dlgCont.classList.add('visible');
      } else {
        dlgCont.textContent = '[ E to close ]';
        dlgCont.classList.add('visible');
      }
    }
  });
}

function openDialogue(npcIdx) {
  audioCtx.resume();
  dialogueActive = true;
  eConsumed = true;
  currentNpcIdx = npcIdx;
  dlgBox.classList.add('active');
  if (document.pointerLockElement) document.exitPointerLock();
  showNode(npcIdx, 0);
}

function endDialogue(npcIdx) {
  stopTalking();
  if (typeInterval) clearInterval(typeInterval);
  dlgBox.classList.remove('active');
  dialogueActive = false;
  eConsumed = true;

  if (!talked[npcIdx]) {
    talked[npcIdx] = true;
    updateTalkedCounter();
    if (talked.every(v => v)) {
      setTimeout(startCutscene, 800);
    }
  }
}

function handleE() {
  if (eConsumed) { eConsumed = false; return; }

  if (dialogueActive) {
    const node = NPCS[currentNpcIdx].dialogue[currentNodeIdx];
    if (!typingDone) {
      // skip typing
      if (typeInterval) clearInterval(typeInterval);
      typeInterval = null;
      dlgText.textContent = fullText;
      typingDone = true;
      if (node.choices) {
        dlgChoices.classList.add('visible');
        // rebuild choices if needed
      } else {
        if (node.next !== null && node.next !== undefined) {
          dlgCont.classList.add('visible');
        } else {
          dlgCont.textContent = '[ E to close ]';
          dlgCont.classList.add('visible');
        }
      }
      return;
    }
    if (!node.choices) {
      if (node.next !== null && node.next !== undefined) {
        dlgCont.classList.remove('visible');
        showNode(currentNpcIdx, node.next);
      } else {
        endDialogue(currentNpcIdx);
      }
    }
    return;
  }

  // Check proximity to NPCs
  for (let i = 0; i < npcMeshes.length; i++) {
    const m = npcMeshes[i];
    const dx = camera.position.x - m.position.x;
    const dz = camera.position.z - m.position.z;
    if (Math.sqrt(dx*dx+dz*dz) < 5.5) {
      openDialogue(i);
      return;
    }
  }
}

function updateTalkedCounter() {
  const symbols = talked.map(v => v ? '●' : '○');
  document.getElementById('talked-counter').textContent = symbols.join('  ');
}

// ═══════════════════════════════════════════════
//  CUTSCENE
// ═══════════════════════════════════════════════
let cutsceneActive = false;
let cutsceneT = 0;
let cutsceneFocusIdx = 0;

function startCutscene() {
  cutsceneActive = true;
  cutsceneT = 0;
  cutscenePhase = 0;
  cutscenePhaseT = 0;
  cutsceneFocusIdx = Math.floor(Math.random() * NPCS.length);

  document.getElementById('hud').style.opacity = '0';
  document.getElementById('talked-counter').style.opacity = '0';
  document.getElementById('prompt').style.opacity = '0';
  document.getElementById('vignette').classList.add('on');
  if (document.pointerLockElement) document.exitPointerLock();

  // Teleport to arena centre
  camera.position.set(0, 2.2, 0);

  // Face toward chosen NPC
  const focusNpc = NPCS[cutsceneFocusIdx];
  yaw = Math.atan2(focusNpc.position.x, focusNpc.position.z);
  pitch = 0;
}

let cutscenePhase = 0;
let cutscenePhaseT = 0;

function smoothLookAt(target, dt, speed) {
  const dir = target.clone().sub(camera.position).normalize();
  const targetYaw = Math.atan2(dir.x, dir.z);
  const targetPitch = Math.asin(Math.max(-1, Math.min(1, dir.y)));
  let dy = targetYaw - yaw;
  if (dy > Math.PI) dy -= 2*Math.PI;
  if (dy < -Math.PI) dy += 2*Math.PI;
  yaw   += dy * dt * speed;
  pitch += (targetPitch - pitch) * dt * speed;
}

function updateCutscene(dt) {
  cutsceneT += dt;
  cutscenePhaseT += dt;

  const focusMesh = npcMeshes[cutsceneFocusIdx];

  if (cutscenePhase === 0) {
    // Settle: look at chosen NPC standing still
    const target = new THREE.Vector3(
      NPCS[cutsceneFocusIdx].position.x, 2.1, NPCS[cutsceneFocusIdx].position.z
    );
    smoothLookAt(target, dt, 3.5);
    if (cutscenePhaseT > 1.2) { cutscenePhase = 1; cutscenePhaseT = 0; }

  } else if (cutscenePhase === 1) {
    // Chosen NPC rises fast; others drift up gently; camera tracks the focus NPC
    focusMesh.position.y += dt * 7.0;
    npcMeshes.forEach((m, i) => {
      if (i !== cutsceneFocusIdx) m.position.y += dt * 1.8;
    });

    const trackTarget = new THREE.Vector3(
      focusMesh.position.x, focusMesh.position.y, focusMesh.position.z
    );
    smoothLookAt(trackTarget, dt, 4.0);

    if (cutscenePhaseT > 2.8) {
      cutscenePhase = 2;
      cutscenePhaseT = 0;
      const ov = document.getElementById('overlay');
      ov.classList.remove('fadein');
      ov.classList.add('fadeout');
      setTimeout(() => { window.location.href = 'temple.html'; }, 2200);
    }
  }
}

// ═══════════════════════════════════════════════
//  PROXIMITY PROMPT
// ═══════════════════════════════════════════════
const promptEl = document.getElementById('prompt');
function showPrompt(txt) { promptEl.textContent = txt; promptEl.style.opacity = '1'; }
function hidePrompt()    { promptEl.style.opacity = '0'; }

// ═══════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════
let lastTime = performance.now();

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt  = Math.min((now - lastTime) / 1000, 0.05);
  lastTime  = now;
  const t   = now / 1000;

  if (cutsceneActive) {
    updateCutscene(dt);
  } else if (!dialogueActive) {
    // Movement
    const speed = 7;
    const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
    const right   = new THREE.Vector3( Math.cos(yaw), 0, -Math.sin(yaw));
    if (keys['KeyW'] || keys['ArrowUp'])    camera.position.addScaledVector(forward,  speed*dt);
    if (keys['KeyS'] || keys['ArrowDown'])  camera.position.addScaledVector(forward, -speed*dt);
    if (keys['KeyA'] || keys['ArrowLeft'])  camera.position.addScaledVector(right,   -speed*dt);
    if (keys['KeyD'] || keys['ArrowRight']) camera.position.addScaledVector(right,    speed*dt);
    camera.position.y = 2.2;
    // Border clamp
    camera.position.x = Math.max(-BORDER+2, Math.min(BORDER-2, camera.position.x));
    camera.position.z = Math.max(-BORDER+2, Math.min(BORDER-2, camera.position.z));
  }

  // Apply camera rotation
  const qYaw   = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), yaw);
  const qPitch = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0), pitch);
  camera.quaternion.copy(qYaw).multiply(qPitch);

  // Billboard NPCs to face camera
  npcMeshes.forEach(m => {
    m.rotation.y = Math.atan2(
      camera.position.x - m.position.x,
      camera.position.z - m.position.z
    );
    // Subtle float
    if (!cutsceneActive) m.position.y = 2.1 + Math.sin(t*1.3 + m.userData.npcIndex * 1.4) * 0.08;
  });

  // Proximity prompt
  if (!dialogueActive && !cutsceneActive) {
    let nearAny = false;
    for (let i = 0; i < npcMeshes.length; i++) {
      const m = npcMeshes[i];
      const dx = camera.position.x - m.position.x;
      const dz = camera.position.z - m.position.z;
      if (Math.sqrt(dx*dx+dz*dz) < 5.5) {
        showPrompt(`[ E — TALK TO ${NPCS[i].name.toUpperCase()} ]`);
        nearAny = true;
        break;
      }
    }
    if (!nearAny) hidePrompt();
  } else {
    hidePrompt();
  }

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── START
const bgm = document.getElementById('bgm');
document.addEventListener('click', () => bgm.play().catch(()=>{}), { once: true });
document.addEventListener('keydown', () => bgm.play().catch(()=>{}), { once: true });

const overlay = document.getElementById('overlay');
animate();
setTimeout(() => overlay.classList.add('fadein'), 600);
</script>
