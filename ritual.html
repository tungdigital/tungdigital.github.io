  const bin = atob(MESH_B64);
  const raw = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) raw[i] = bin.charCodeAt(i);
  // zlib inflate via pako (loaded below)
  const inf = pako.inflate(raw);
  // uint16 -> float32 positions
  const n = MESH_N_VERTS;
  const view = new DataView(inf.buffer, inf.byteOffset, inf.byteLength);
  const pos  = new Float32Array(n * 3);
  const rx = MESH_BOUNDS.maxx - MESH_BOUNDS.minx;
  const ry = MESH_BOUNDS.maxy - MESH_BOUNDS.miny;
  const rz = MESH_BOUNDS.maxz - MESH_BOUNDS.minz;
  for (let i = 0; i < n; i++) {
    pos[i*3+0] = MESH_BOUNDS.minx + (view.getUint16(i*6+0, true) / 65535) * rx;
    pos[i*3+1] = MESH_BOUNDS.miny + (view.getUint16(i*6+2, true) / 65535) * ry;
    pos[i*3+2] = MESH_BOUNDS.minz + (view.getUint16(i*6+4, true) / 65535) * rz;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.computeVertexNormals();
  return geo;
}

<!-- pako for zlib inflate -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<script>
// ═══════════════════════════════════
//  SCENE
// ═══════════════════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeeeeee);
scene.fog = new THREE.Fog(0xeeeeee, 7, 32);

const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(0.6);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

function ps1Snap(geo, snap = 0.14) {
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    pos.setX(i, Math.round(pos.getX(i)/snap)*snap);
    pos.setY(i, Math.round(pos.getY(i)/snap)*snap);
    pos.setZ(i, Math.round(pos.getZ(i)/snap)*snap);
  }
  pos.needsUpdate = true; return geo;
}

const camera = new THREE.PerspectiveCamera(72, window.innerWidth/window.innerHeight, 0.1, 44);
camera.position.set(0, 1.75, 0);

scene.add(new THREE.AmbientLight(0xffffff, 1.15));
const dirLight = new THREE.DirectionalLight(0xdde8ff, 0.5);
dirLight.position.set(8, 22, 6);
scene.add(dirLight);

const groundMat = new THREE.MeshPhongMaterial({ color: 0xe2e2e2, flatShading: true });
const groundGeo = new THREE.PlaneGeometry(300, 300, 55, 55);
const gPos = groundGeo.attributes.position;
for (let i = 0; i < gPos.count; i++) gPos.setZ(i, gPos.getZ(i)+(Math.random()-0.5)*0.09);
groundGeo.computeVertexNormals();
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ═══════════════════════════════════
//  HUMANOIDS — shared OBJ geometry
//  Model height: ~20.74 units → scale to 1.75
// ═══════════════════════════════════
const HUMAN_SCALE = 1.75 / 20.74;
const humanMat = new THREE.MeshPhongMaterial({ color: 0x050505, flatShading: true });

// Decode the inlined mesh
const baseHumanGeo = decodeMesh();

const humanoids = [];

function makeHumanoid(x, z, wandering) {
  const root = new THREE.Group();
  root.position.set(x, 0, z);

  // Body mesh — shared geometry, individual matrix
  const mesh = new THREE.Mesh(baseHumanGeo, humanMat);
  mesh.scale.setScalar(HUMAN_SCALE);
  mesh.position.y = 0.06 * HUMAN_SCALE; // nudge feet to y=0
  root.add(mesh);

  // Invisible head-jitter pivot at ~neck height
  // Rotating this subtly drives the unsettling head wobble
  const headPivot = new THREE.Object3D();
  headPivot.position.y = 1.75 * 0.84;
  root.add(headPivot);

  root._headPivot = headPivot;
  root._mesh      = mesh;
  root._wandering = wandering;
  root._angle     = Math.random() * Math.PI * 2;
  root._speed     = 0.5 + Math.random() * 0.25;
  root._jitterT   = Math.random() * 20;
  root._turnTimer = Math.random() * 3;
  root._stepPhase = Math.random() * Math.PI * 2;
  scene.add(root);
  return root;
}

// ═══════════════════════════════════
//  SCULPTURES
// ═══════════════════════════════════
const sculpturePositions = [
  { x: -18, z: -22 },
  { x:  22, z: -18 },
  { x:   2, z: -30 },
];
const buttons = [], sculptures = [];
const sculptMat = new THREE.MeshPhongMaterial({ color: 0xd5d5d5, flatShading: true });
const btnIdleMat = () => new THREE.MeshPhongMaterial({
  color:0x111111, flatShading:true, emissive:new THREE.Color(0x333333), emissiveIntensity:1.0 });
const btnDoneMat = () => new THREE.MeshPhongMaterial({
  color:0xffffff, flatShading:true, emissive:new THREE.Color(0x999999), emissiveIntensity:0.6 });

function makeSculpture(pos, idx) {
  const g = new THREE.Group();
  g.position.set(pos.x, 0, pos.z);
  if (idx === 0) {
    for (let i = 0; i < 6; i++) {
      const s = 1.1-i*0.13;
      const m = new THREE.Mesh(ps1Snap(new THREE.BoxGeometry(s,0.85,s,2,2,2)), sculptMat);
      m.position.y = 0.43+i*0.85; m.rotation.y = i*0.28; g.add(m);
    }
    const cap = new THREE.Mesh(ps1Snap(new THREE.ConeGeometry(0.45,1.1,4,1)), sculptMat);
    cap.position.y = 6.1; cap.rotation.y = Math.PI/4; g.add(cap);
    const ped = new THREE.Mesh(ps1Snap(new THREE.BoxGeometry(0.32,0.65,0.20,1,1,1)), sculptMat);
    ped.position.set(0,2.5,0.62); g.add(ped);
    const btn = new THREE.Mesh(ps1Snap(new THREE.CylinderGeometry(0.20,0.20,0.16,6)), btnIdleMat());
    btn.rotation.x = Math.PI/2; btn.position.set(0,2.5,0.76); g.add(btn);
    buttons.push({mesh:btn, activated:false, sculptureIndex:idx, worldPos:new THREE.Vector3(pos.x,2.5,pos.z+0.76)});
  } else if (idx === 1) {
    for (let ring = 0; ring < 5; ring++) {
      const r=1.3-ring*0.18, cnt=12;
      for (let j=0;j<cnt;j++) {
        const a=(j/cnt)*Math.PI*2;
        const m=new THREE.Mesh(ps1Snap(new THREE.BoxGeometry(0.20,0.20,0.20,1,1,1)),sculptMat);
        m.position.set(Math.cos(a)*r,1.2+ring*0.62+Math.sin(a*2)*0.16,Math.sin(a)*r);
        m.rotation.y=a; g.add(m);
      }
    }
    const pil=new THREE.Mesh(ps1Snap(new THREE.CylinderGeometry(0.14,0.24,4.2,5)),sculptMat);
    pil.position.y=2.1; g.add(pil);
    const bkt=new THREE.Mesh(ps1Snap(new THREE.BoxGeometry(0.12,0.52,0.58,1,1,1)),sculptMat);
    bkt.position.set(0,2.0,0.48); g.add(bkt);
    const btn=new THREE.Mesh(ps1Snap(new THREE.CylinderGeometry(0.20,0.20,0.16,6)),btnIdleMat());
    btn.rotation.x=Math.PI/2; btn.position.set(0,2.0,0.80); g.add(btn);
    buttons.push({mesh:btn,activated:false,sculptureIndex:idx,worldPos:new THREE.Vector3(pos.x,2.0,pos.z+0.80)});
  } else {
    const sizes=[1.7,1.1,0.75,0.48];
    const offsets=[[0,0,0],[0.55,1.0,-0.3],[-0.45,1.75,0.35],[0.15,2.42,-0.1]];
    for (let i=0;i<sizes.length;i++) {
      const m=new THREE.Mesh(ps1Snap(new THREE.DodecahedronGeometry(sizes[i],0)),sculptMat);
      m.position.set(offsets[i][0],offsets[i][1]+sizes[i],offsets[i][2]);
      m.rotation.set(Math.random()*6,Math.random()*6,Math.random()*6); g.add(m);
    }
    const arm=new THREE.Mesh(ps1Snap(new THREE.BoxGeometry(0.10,0.10,0.75,1,1,1)),sculptMat);
    arm.position.set(0,1.7,1.2); g.add(arm);
    const btn=new THREE.Mesh(ps1Snap(new THREE.CylinderGeometry(0.20,0.20,0.16,6)),btnIdleMat());
    btn.rotation.x=Math.PI/2; btn.position.set(0,1.7,1.6); g.add(btn);
    buttons.push({mesh:btn,activated:false,sculptureIndex:idx,worldPos:new THREE.Vector3(pos.x,1.7,pos.z+1.6)});
  }
  scene.add(g); sculptures.push(g); return g;
}
sculpturePositions.forEach((p,i)=>makeSculpture(p,i));

// Spawn humanoids
for (let i=0;i<20;i++) {
  const a=Math.random()*Math.PI*2, r=8+Math.random()*24;
  humanoids.push(makeHumanoid(Math.cos(a)*r, Math.sin(a)*r, true));
}
sculpturePositions.forEach(pos=>{
  const cnt=3+Math.floor(Math.random()*3);
  for (let i=0;i<cnt;i++) {
    const a=(i/cnt)*Math.PI*2+Math.random()*0.3, r=2.4+Math.random()*1.3;
    const h=makeHumanoid(pos.x+Math.cos(a)*r, pos.z+Math.sin(a)*r, false);
    h.rotation.y=Math.atan2(pos.x-h.position.x, pos.z-h.position.z);
    humanoids.push(h);
  }
});

// ═══════════════════════════════════
//  SPIRAL STAIRCASE
// ═══════════════════════════════════
const stairMat   = new THREE.MeshPhongMaterial({color:0xcfcfcf,flatShading:true});
const centralMat = new THREE.MeshPhongMaterial({color:0xbbbbbb,flatShading:true});
const SPIRAL_STEPS=28, SPIRAL_RADIUS=2.2, STEP_RISE=0.38;
const STEP_ARC=(Math.PI*2*1.8)/SPIRAL_STEPS;
const STEP_W=2.0, STEP_H=0.14, STEP_D=1.1;

const staircaseGroup=new THREE.Group();
staircaseGroup.visible=false;
scene.add(staircaseGroup);

const postH=SPIRAL_STEPS*STEP_RISE+2.0;
const postMesh=new THREE.Mesh(ps1Snap(new THREE.CylinderGeometry(0.22,0.22,postH,6)),centralMat);
postMesh.position.y=postH/2;
staircaseGroup.add(postMesh);

const stepMeshes=[], stepTargetY=[];
for (let i=0;i<SPIRAL_STEPS;i++) {
  const angle=i*STEP_ARC;
  const tx=Math.cos(angle)*SPIRAL_RADIUS, tz=Math.sin(angle)*SPIRAL_RADIUS;
  const ty=i*STEP_RISE+STEP_H/2;
  const m=new THREE.Mesh(ps1Snap(new THREE.BoxGeometry(STEP_W,STEP_H,STEP_D,2,1,1)),stairMat);
  m.rotation.y=-angle; m.position.set(tx,-25,tz);
  staircaseGroup.add(m); stepMeshes.push(m); stepTargetY.push(ty);
}
const topAngle=SPIRAL_STEPS*STEP_ARC, topY=SPIRAL_STEPS*STEP_RISE;
const platMesh=new THREE.Mesh(ps1Snap(new THREE.BoxGeometry(3.4,0.18,3.4,2,1,2)),stairMat);
platMesh.position.set(Math.cos(topAngle)*SPIRAL_RADIUS,-25,Math.sin(topAngle)*SPIRAL_RADIUS);
staircaseGroup.add(platMesh);
const platTargetY=topY+STEP_H/2;

const finalBtnMat=new THREE.MeshPhongMaterial({color:0x111111,flatShading:true,
  emissive:new THREE.Color(0x333333),emissiveIntensity:1.0});
const finalButtonMesh=new THREE.Mesh(ps1Snap(new THREE.CylinderGeometry(0.24,0.24,0.20,6)),finalBtnMat);
finalButtonMesh.position.set(Math.cos(topAngle)*SPIRAL_RADIUS,-25,Math.sin(topAngle)*SPIRAL_RADIUS);
staircaseGroup.add(finalButtonMesh);
const fbTargetY=topY+STEP_H+0.10;

let staircaseSpawned=false, stairAnimating=false, stairAnimT=0;
const STAIR_ANIM_DUR=3.2;
function spawnStaircase(){staircaseSpawned=true;stairAnimating=true;stairAnimT=0;staircaseGroup.visible=true;}
function updateStaircaseAnim(dt){
  if (!stairAnimating) return;
  stairAnimT+=dt;
  const prog=Math.min(stairAnimT/STAIR_ANIM_DUR,1.0);
  for (let i=0;i<SPIRAL_STEPS;i++){
    const delay=(i/SPIRAL_STEPS)*0.75;
    const lp=Math.max(0,Math.min(1,(prog-delay)/(1.0-delay+0.001)));
    stepMeshes[i].position.y=-25+(stepTargetY[i]+25)*(1-Math.pow(1-lp,3));
  }
  const pd=0.84,pp=Math.max(0,Math.min(1,(prog-pd)/(1.0-pd+0.001)));
  const pe=1-Math.pow(1-pp,3);
  platMesh.position.y=-25+(platTargetY+25)*pe;
  finalButtonMesh.position.y=-25+(fbTargetY+25)*pe;
  if (prog>=1.0) stairAnimating=false;
}

// FIXED stair height — reachability gate prevents spiral wrap teleport
function getSpiralStairY(px,pz,camY){
  if (!staircaseSpawned) return 0;
  const hw=STEP_W/2+0.30, hd=STEP_D/2+0.30;
  const playerFeet=camY-1.75;
  let best=0;
  for (let i=0;i<SPIRAL_STEPS;i++){
    const m=stepMeshes[i];
    if (m.position.y<0) continue;
    const surf=m.position.y+STEP_H/2;
    if (surf>playerFeet+STEP_RISE*1.6) continue; // can't teleport up
    const c=Math.cos(-m.rotation.y),s=Math.sin(-m.rotation.y);
    const dx=px-m.position.x, dz=pz-m.position.z;
    if (Math.abs(c*dx-s*dz)<hw && Math.abs(s*dx+c*dz)<hd){
      const fy=surf+1.75; if(fy>best) best=fy;
    }
  }
  const pdx=px-platMesh.position.x,pdz=pz-platMesh.position.z;
  if (Math.abs(pdx)<1.85&&Math.abs(pdz)<1.85&&platMesh.position.y>0){
    const ps=platMesh.position.y+0.09;
    if (ps<=playerFeet+STEP_RISE*1.6){const fy=ps+1.75;if(fy>best)best=fy;}
  }
  return best;
}

// ═══════════════════════════════════
//  STATE / INPUT
// ═══════════════════════════════════
let activatedCount=0;
const counterEl=document.getElementById('counter');
const symbols=['○','○','○'];
function updateCounter(){counterEl.textContent=symbols.join('  ');}

const domEl=renderer.domElement;
let yaw=0,pitch=0,pointerLocked=false;
domEl.addEventListener('click',()=>{
  domEl.requestPointerLock();
  const bgm=document.getElementById('bgm');
  bgm.volume=0.22; bgm.play().catch(()=>{});
});
document.addEventListener('pointerlockchange',()=>{pointerLocked=document.pointerLockElement===domEl;});
document.addEventListener('mousemove',e=>{
  if(!pointerLocked)return;
  yaw-=e.movementX*0.0022; pitch-=e.movementY*0.0022;
  pitch=Math.max(-0.55,Math.min(0.55,pitch));
});
const keys={};
document.addEventListener('keydown',e=>{keys[e.code]=true;});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

const promptEl=document.getElementById('prompt');
let activePrompt='';
function showPrompt(txt){if(activePrompt!==txt){activePrompt=txt;promptEl.textContent=txt;promptEl.style.opacity='1';}}
function hidePrompt(){if(activePrompt!==''){activePrompt='';promptEl.style.opacity='0';}}

const overlay=document.getElementById('overlay');
let gameEnded=false, eWasDown=false;

// ═══════════════════════════════════
//  LOOP
// ═══════════════════════════════════
const clock=new THREE.Clock();
let t=0;
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  t+=dt;
  updateStaircaseAnim(dt);

  if (!gameEnded){
    const speed=4.8;
    const dir=new THREE.Vector3();
    if(keys['KeyW']||keys['ArrowUp'])   dir.z-=1;
    if(keys['KeyS']||keys['ArrowDown']) dir.z+=1;
    if(keys['KeyA']||keys['ArrowLeft']) dir.x-=1;
    if(keys['KeyD']||keys['ArrowRight'])dir.x+=1;
    if(dir.length()>0){
      dir.normalize().applyEuler(new THREE.Euler(0,yaw,0));
      camera.position.x+=dir.x*speed*dt;
      camera.position.z+=dir.z*speed*dt;
      camera.position.x=Math.max(-100,Math.min(100,camera.position.x));
      camera.position.z=Math.max(-100,Math.min(100,camera.position.z));
    }
    const sf=getSpiralStairY(camera.position.x,camera.position.z,camera.position.y);
    const ty2=Math.max(1.75,sf);
    camera.position.y+=((ty2>camera.position.y?0.22:0.28))*(ty2-camera.position.y);
    camera.rotation.order='YXZ'; camera.rotation.y=yaw; camera.rotation.x=pitch;

    const eDown=!!(keys['KeyE']||keys['Space']);
    const ePressed=eDown&&!eWasDown; eWasDown=eDown;
    let nearAny=false;

    buttons.forEach((btn,i)=>{
      if(btn.activated)return;
      if(camera.position.distanceTo(btn.worldPos)<3.4){
        showPrompt('[ E — ACTIVATE ]'); nearAny=true;
        if(ePressed){
          btn.activated=true; btn.mesh.material=btnDoneMat();
          activatedCount++; symbols[i]='●'; updateCounter();
          if(activatedCount>=3) setTimeout(spawnStaircase,350);
        }
      }
    });

    if(staircaseSpawned&&!stairAnimating){
      const fbW=new THREE.Vector3(); finalButtonMesh.getWorldPosition(fbW);
      if(camera.position.distanceTo(fbW)<2.8){
        showPrompt('[ E — ASCEND ]'); nearAny=true;
        if(ePressed){
          gameEnded=true;
          overlay.classList.remove('fadein'); overlay.classList.add('fadeout');
          setTimeout(()=>{window.location.href='783.html';},2400);
        }
      }
    }
    if(!nearAny)hidePrompt();
  }

  // Humanoid animation
  humanoids.forEach(h=>{
    h._jitterT+=dt;
    const jt=h._jitterT;
    // Head wobble via pivot (no separate head mesh needed)
    h._headPivot.rotation.x=Math.sin(jt*4.1)*0.048+Math.sin(jt*11.3)*0.018;
    h._headPivot.rotation.z=Math.cos(jt*3.9)*0.036+Math.cos(jt*9.1)*0.014;
    h._headPivot.rotation.y=Math.sin(jt*2.7)*0.042;
    if(h._wandering){
      h._turnTimer-=dt;
      if(h._turnTimer<=0){h._angle+=(Math.random()-0.5)*1.6;h._turnTimer=1.2+Math.random()*3.2;}
      h.position.x+=Math.sin(h._angle)*h._speed*dt;
      h.position.z+=Math.cos(h._angle)*h._speed*dt;
      h.position.x=Math.max(-65,Math.min(65,h.position.x));
      h.position.z=Math.max(-65,Math.min(65,h.position.z));
      h.rotation.y=h._angle;
      // Subtle body sway while walking
      h._mesh.rotation.z=Math.sin(jt*4.8+h._stepPhase)*0.016;
    }
  });

  sculptures.forEach((s,i)=>{s.rotation.y=Math.sin(t*0.11+i*2.0)*0.035;});
  buttons.forEach((btn,i)=>{
    if(!btn.activated) btn.mesh.material.emissiveIntensity=0.6+0.4*Math.abs(Math.sin(t*2.2+i));
  });
  if(staircaseSpawned) finalButtonMesh.material.emissiveIntensity=0.6+0.4*Math.abs(Math.sin(t*2.5));

  renderer.render(scene,camera);
}
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
animate();
setTimeout(()=>overlay.classList.add('fadein'),600);
</script>
