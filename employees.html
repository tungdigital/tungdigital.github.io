<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="additional/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>employees only</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #cc0000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>

  <img src="images/emp.jpg" alt="">

  <audio autoplay loop>
    <source src="audio/bmx.mp3" type="audio/mpeg">
  </audio>

  <script>
    // Random delay between 30 seconds (30000ms) and 3 minutes (180000ms)
    const min = 30 * 1000;
    const max = 3 * 60 * 1000;
    const delay = Math.floor(Math.random() * (max - min + 1)) + min;

    setTimeout(function () {
      window.location.href = '1more.html';
    }, delay);
  </script>

</body>
</html>
