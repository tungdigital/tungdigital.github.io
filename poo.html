<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="additional/favicon.ico">
<meta charset="UTF-8">
<title>just for fun</title>

<style>
html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
}

body {
    background-image: url("images/awesomebackground.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    position: relative;
    font-family: "Comic Sans MS", "Comic Sans", cursive;
}

.gif-layer {
    position: absolute;
    width: 100%;
    height: 100%;
}

.gif {
    position: absolute;
    width: 120px;
    pointer-events: none;
}

.button-layer {
    position: absolute;
    width: 100%;
    height: 100%;
}

.random-button {
    position: absolute;
    padding: 12px 18px;
    font-size: 18px;
    border: 2px solid black;
    cursor: pointer;
}
</style>
</head>

<body>

<audio autoplay loop>
<source src="audio/jcge.mp3" type="audio/mpeg">
</audio>

<div class="gif-layer" id="gifLayer"></div>
<div class="button-layer" id="buttonLayer"></div>

<script>
const gifLayer = document.getElementById("gifLayer");
const buttonLayer = document.getElementById("buttonLayer");

const gifCount = 25;
const buttonCount = 12;

function randomColor() {
    const r = Math.floor(Math.random()*256);
    const g = Math.floor(Math.random()*256);
    const b = Math.floor(Math.random()*256);
    return "rgb(" + r + "," + g + "," + b + ")";
}

/* Generate GIFs */
for (let i = 0; i < gifCount; i++) {
    const img = document.createElement("img");
    img.src = "images/pom.gif";
    img.className = "gif";

    img.style.left = Math.random()*100 + "%";
    img.style.top = Math.random()*100 + "%";
    img.style.width = (80 + Math.random()*80) + "px";
    img.style.transform = "rotate(" + (Math.random()*360) + "deg)";

    gifLayer.appendChild(img);
}

/* Generate Buttons */
for (let i = 0; i < buttonCount; i++) {
    const btn = document.createElement("button");
    btn.className = "random-button";

    btn.style.left = Math.random()*100 + "%";
    btn.style.top = Math.random()*100 + "%";
    btn.style.backgroundColor = randomColor();
    btn.style.color = randomColor();

    if (i === 0) {
        btn.innerText = "just piss off you fucking shit";
        btn.onclick = function() {
            window.location.href = "temple.html";
        };
    } else {
        btn.innerText = "button";
    }

    buttonLayer.appendChild(btn);
}
</script>

</body>
</html>
