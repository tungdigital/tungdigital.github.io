// ─── RENDERER ───────────────────────────────────────────────────────────────

renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
document.body.appendChild(renderer.domElement);

// ─── SCENE / CAMERA ─────────────────────────────────────────────────────────

const camera = new THREE.PerspectiveCamera(72, innerWidth / innerHeight, 0.05, 60);
camera.position.set(0, 1.65, 0);

// ─── POINTER LOCK ────────────────────────────────────────────────────────────
let locked = false;
let yaw = 0, pitch = 0;
document.addEventListener('click', () => renderer.domElement.requestPointerLock());
document.addEventListener('pointerlockchange', () => { locked = document.pointerLockElement === renderer.domElement; });
document.addEventListener('mousemove', e => {
  if (!locked) return;
  yaw   -= e.movementX * 0.0018;
  pitch -= e.movementY * 0.0018;
  pitch = Math.max(-1.1, Math.min(1.1, pitch));
});

// ─── KEYS ────────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => keys[e.code] = true);
document.addEventListener('keyup',   e => keys[e.code] = false);

}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function box(w, h, d, material, x, y, z, rx = 0, ry = 0, rz = 0) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
  m.position.set(x, y, z);
  m.rotation.set(rx, ry, rz);
  m.castShadow = true; m.receiveShadow = true;
  scene.add(m); return m;
}
function cyl(rt, rb, h, seg, material, x, y, z) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, seg), material);
  m.position.set(x, y, z);
  m.castShadow = true; m.receiveShadow = true;
  scene.add(m); return m;
}

// ─── MOVEMENT ────────────────────────────────────────────────────────────────
const SPEED = 2.8;
const vel = new THREE.Vector3();
const _dir = new THREE.Vector3();

function move(dt) {
  const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  const right   = new THREE.Vector3( Math.cos(yaw), 0, -Math.sin(yaw));
  vel.set(0, 0, 0);
  if (keys['KeyW'] || keys['ArrowUp'])    vel.addScaledVector(forward,  1);
  if (keys['KeyS'] || keys['ArrowDown'])  vel.addScaledVector(forward, -1);
  if (keys['KeyD'] || keys['ArrowRight']) vel.addScaledVector(right,    1);
  if (keys['KeyA'] || keys['ArrowLeft'])  vel.addScaledVector(right,   -1);
  if (vel.lengthSq() > 0) vel.normalize();
  vel.multiplyScalar(SPEED * dt);

  // Try X
  let nx = camera.position.x + vel.x;
  let nz = camera.position.z;
  if (nx > walls[0].min && nx < walls[0].max) {
    const blocked = obstacles.some(o => nx > o[0] && nx < o[2] && nz > o[1] && nz < o[3]);
    if (!blocked) camera.position.x = nx;
  }
  // Try Z
  nx = camera.position.x;
  nz = camera.position.z + vel.z;
  if (nz > walls[1].min && nz < walls[1].max) {
    const blocked = obstacles.some(o => nx > o[0] && nx < o[2] && nz > o[1] && nz < o[3]);
    if (!blocked) camera.position.z = nz;
  }

  camera.position.y = 1.65; // lock height
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;
}

// ─── ANIMATION ───────────────────────────────────────────────────────────────
let last = 0;
let t = 0;
let gameStartTime = null;
let ending = false;

function animate(ts = 0) {
  requestAnimationFrame(animate);
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;
  t += dt;

  if (gameStartTime === null) gameStartTime = ts;
  const elapsed = (ts - gameStartTime) / 1000;

  move(dt);

  // Billboard George to always face camera
  george.rotation.y = Math.atan2(
    camera.position.x - george.position.x,
    camera.position.z - george.position.z
  );

  // Candle flicker
  candleLight.intensity = 0.4 + 0.18 * Math.sin(t * 7.3) + 0.08 * Math.sin(t * 13.1) + 0.05 * Math.sin(t * 23.7);
  candleLight.color.setHSL(0.07 + Math.sin(t * 5) * 0.01, 1, 0.55);

  // Lamp subtle breathing
  lampLight.intensity = 1.8 + 0.05 * Math.sin(t * 1.2);

  // Stars twinkle
  starMat.opacity = 0.55 + 0.2 * Math.sin(t * 0.9) + 0.1 * Math.sin(t * 2.3);

  // 30-second fade out and redirect
  if (!ending && elapsed >= 30) {
    ending = true;
    overlay.style.transition = 'opacity 2.5s ease';
    overlay.style.background = '#000';
    overlay.style.opacity = '1';
    setTimeout(() => { window.location.href = 'poo.html'; }, 2600);
  }

  renderer.render(scene, camera);
}

// ─── FADE IN ─────────────────────────────────────────────────────────────────
const overlay = document.getElementById('overlay');
const title   = document.getElementById('title');
const bgm     = document.getElementById('bgm');

// Start music on first click or keypress
function startBgm() { bgm.play().catch(() => {}); }
document.addEventListener('click',   startBgm, { once: true });
document.addEventListener('keydown', startBgm, { once: true });

setTimeout(() => overlay.classList.add('fadein'), 800);
setTimeout(() => title.classList.add('hide'), 2200);

animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
